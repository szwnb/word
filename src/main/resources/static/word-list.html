<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>词汇书详情与个人进度</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f5; padding: 40px; }
        .dashboard { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ecf0f1; padding: 12px; text-align: left; }
        th { background-color: #34495e; color: white; }

        /* 状态视觉标识 */
        .status-0 { color: #e74c3c; font-weight: bold; } /* 未记住 - 红色 */
        .status-1 { color: #f39c12; font-weight: bold; } /* 模糊 - 黄色 */
        .status-2 { color: #2ecc71; font-weight: bold; } /* 已记住 - 绿色 */
    </style>
</head>
<body>

<div class="dashboard">
    <h2>📖 核心词汇列表与进度追踪</h2>
    <table>
        <thead>
        <tr>
            <th>英文单词</th>
            <th>中文释义</th>
            <th>不记得次数</th>
            <th>当前状态</th>
        </tr>
        </thead>
        <tbody id="word-table-body">
        <tr><td colspan="4" style="text-align: center;">数据调取中...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // 将数字状态转换为肉眼可读的文字和 CSS 类
    function parseStatus(statusCode) {
        if (statusCode === 2) return { text: '已记住', css: 'status-2' };
        if (statusCode === 1) return { text: '模 糊', css: 'status-1' };
        return { text: '未记住', css: 'status-0' };
    }

    // 抓取数据并渲染表格
    async function loadWordList() {
        try {
            // 获取选中的书本ID，防崩溃默认用 1
            const bookId = localStorage.getItem('selectedBookId') || 1;

            // 调用你昨天写好的千人千面接口！
            const response = await fetch(`/api/word/list?bookId=${bookId}`);
            const words = await response.json();

            const tbody = document.getElementById('word-table-body');
            tbody.innerHTML = ''; // 清空加载提示

            // 遍历每个单词，生成表格行 (tr)
            words.forEach(word => {
                const statusInfo = parseStatus(word.status);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${word.wordName}</strong></td>
                    <td>${word.translation}</td>
                    <td>${word.wrongCount} 次</td>
                    <td class="${statusInfo.css}">${statusInfo.text}</td>
                `;
                tbody.appendChild(tr);
            });

        } catch (error) {
            console.error('获取列表失败:', error);
            document.getElementById('word-table-body').innerHTML = '<tr><td colspan="4" style="color:red;text-align:center;">数据拉取异常，请检查后端运行状态。</td></tr>';
        }
    }

    // 页面加载完毕后立即执行
    loadWordList();
</script>

</body>
</html>
